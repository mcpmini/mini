name: github
transport: http
url: https://api.githubcopilot.com/mcp/
headers:
  Authorization: "Bearer ${GITHUB_PERSONAL_ACCESS_TOKEN}"

permissions:
  default: open
  protected:
    - create_pull_request
    - update_pull_request
    - merge_pull_request
    - add_issue_comment
    - add_reply_to_pull_request_comment
    - pull_request_review_write
    - issue_write
    - push_files
    - create_or_update_file
    - delete_file
    - create_repository
    - fork_repository
    - create_branch
