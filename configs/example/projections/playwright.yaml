# Default projections for @playwright/mcp.
# Install to ~/.mini/projections/playwright.yaml
#
# Playwright returns accessibility tree snapshots after most interactions.
# Each snapshot can be 30-100KB of nested tree text. These projections cap the damage.

browser_snapshot:
  string_limits:
    content: 4000
  depth_limit: 4

browser_navigate:
  string_limits:
    content: 4000
  depth_limit: 4

browser_click:
  string_limits:
    content: 3000
  depth_limit: 4

browser_type:
  string_limits:
    content: 3000
  depth_limit: 4

browser_fill_form:
  string_limits:
    content: 3000
  depth_limit: 4

browser_hover:
  string_limits:
    content: 3000
  depth_limit: 4

browser_select_option:
  string_limits:
    content: 3000
  depth_limit: 4

browser_press_key:
  string_limits:
    content: 3000
  depth_limit: 4

browser_drag:
  string_limits:
    content: 3000
  depth_limit: 4

browser_navigate_back:
  string_limits:
    content: 3000
  depth_limit: 4

browser_wait_for:
  string_limits:
    content: 3000
  depth_limit: 4

browser_take_screenshot:
  exclude_always: [data, base64]

browser_evaluate:
  string_limits:
    result: 2000

browser_run_code:
  string_limits:
    result: 2000
    output: 2000

browser_console_messages:
  array_limits:
    messages: 50
  string_limits:
    text: 500

browser_network_requests:
  array_limits:
    requests: 30
  exclude_always: [headers, body, requestBody]

browser_handle_dialog:
  string_limits:
    content: 1000
