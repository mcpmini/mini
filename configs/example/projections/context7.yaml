# Default projections for the @upstash/context7-mcp MCP.
# Install to ~/.mini/projections/context7.yaml
#
# context7 returns plain-text markdown documents, not JSON objects.
# The slim format stores a 500-char preview inline; full docs go to the raw file.
# These projections apply to the structured metadata returned by resolve-library-id.

resolve-library-id:
  array_limits:
    results: 5
    libraries: 5
  exclude_always: [description, stars, lastUpdated]

# query-docs returns a markdown document — no structured fields to project.
# The inline_threshold + slim file handle size automatically.
# Override string limits if you want shorter previews.
query-docs:
  string_limits:
    content: 6000
    text: 6000
