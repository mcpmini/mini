# Default projections for the @modelcontextprotocol/server-filesystem MCP.
# Install to ~/.mini/projections/filesystem.yaml

read_file:
  string_limits:
    content: 4000

read_multiple_files:
  array_limits:
    files: 5
  string_limits:
    content: 2000

list_directory:
  array_limits:
    entries: 50

search_files:
  array_limits:
    matches: 30
  exclude_always: [permissions, created, accessed]

directory_tree:
  depth_limit: 3

get_file_info:
  exclude_always: [permissions, created, accessed, modified]
