# Default projections for the Linear MCP server (https://mcp.linear.app/mcp).
# Install to ~/.mini/projections/linear.yaml

list_issues:
  array_limits:
    issues: 20
  exclude_always: [sortOrder, completedAt, canceledAt, snoozedUntilAt, archivedAt]
  string_limits:
    description: 500

list_my_issues:
  array_limits:
    issues: 20
  exclude_always: [sortOrder, completedAt, canceledAt, snoozedUntilAt, archivedAt]
  string_limits:
    description: 500

search_issues:
  array_limits:
    issues: 20
  exclude_always: [sortOrder, archivedAt]
  string_limits:
    description: 500

get_issue:
  exclude_always: [sortOrder, archivedAt]
  string_limits:
    description: 2000

list_projects:
  array_limits:
    projects: 20
  exclude_always: [sortOrder, archivedAt, completedAt, canceledAt]
  string_limits:
    description: 300

list_teams:
  array_limits:
    teams: 30
  exclude_always: [archivedAt]
