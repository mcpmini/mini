brave_web_search:
  include: [web, query]
  depth_limit: 2
  array_limits:
    results: 10
  string_limits:
    description: 1000
    snippet: 1000
  exclude_always: [family_friendly, type, subtype, meta_url, thumbnail, profile, deep_results, cluster]

brave_news_search:
  include: [news, query]
  depth_limit: 2
  array_limits:
    results: 10
    cluster_articles: 0
  string_limits:
    description: 1000
  exclude_always: [thumbnail, meta_url, breaking]

"*":
  depth_limit: 2
  auto_strip_threshold: 500
