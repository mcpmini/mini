conversations_history:
  array_limits:
    messages: 20
    reactions: 10
    reply_users: 3
  exclude: [client_msg_id, team, edited, subscribed, last_read, bot_profile]
  string_limits:
    text: 1500

conversations_replies:
  array_limits:
    messages: 30
    reactions: 10
  exclude: [client_msg_id, team, edited, subscribed, last_read, bot_profile, reply_users]
  string_limits:
    text: 1500

conversations_list:
  array_limits:
    channels: 50
  exclude: [unlinked, shared_team_ids, pending_shared, pending_connected_team_ids, internal_team_ids, connected_team_ids, enterprise, context_team_id, conversation_host_id]

search_messages:
  array_limits:
    reactions: 10
    reply_users: 3
  exclude: [client_msg_id, team, edited, subscribed, last_read, bot_profile, time_spent_ms]
  string_limits:
    text: 1500

users_list:
  array_limits:
    members: 50
  exclude: [profile.fields, profile.image_24, profile.image_32, profile.image_48, profile.image_72, profile.image_192, profile.image_512, profile.image_1024, profile.image_original, profile.phone, profile.skype, team_id, tz_offset]

