conversations_history:
  include: [messages, has_more, response_metadata]
  array_limits:
    messages: 20
  depth_limit: 2
  exclude_always: [blocks, attachments, reactions, reply_users, bot_profile, edited]
  string_limits:
    text: 1000

conversations_replies:
  include: [messages, has_more]
  array_limits:
    messages: 30
  depth_limit: 2
  exclude_always: [blocks, attachments, reactions, bot_profile, edited]
  string_limits:
    text: 1000

conversations_list:
  include: [channels, response_metadata]
  array_limits:
    channels: 50
  depth_limit: 2
  exclude_always: [shared_team_ids, pending_shared, pending_connected_team_ids, internal_team_ids, connected_team_ids, enterprise, context_team_id, conversation_host_id]

search_messages:
  include: [messages]
  depth_limit: 2
  exclude_always: [blocks, attachments, reactions]
  string_limits:
    text: 500
  array_limits:
    matches: 20

users_list:
  include: [members, response_metadata]
  array_limits:
    members: 50
  depth_limit: 2
  exclude_always: [profile.fields, profile.image_24, profile.image_32, profile.image_48, profile.image_72, profile.image_192, profile.image_512, profile.image_1024, profile.image_original]

"*":
  depth_limit: 3
  auto_strip_threshold: 500
  exclude_always: [ok, cache_ts, response_metadata.messages, response_metadata.warnings]
