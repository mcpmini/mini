# List tools: tight include, body truncated — agents triage by title/number then
# call a specific read tool for full detail.
list_pull_requests:
  include: [number, title, state, draft, merged, body, user, created_at, updated_at, labels, assignees, requested_reviewers, head, base, milestone]
  array_limits:
    default: 20
    labels: 5
    assignees: 3
    requested_reviewers: 3
  string_limits:
    body: 300
  strip_markup: true
  depth_limit: 2

list_issues:
  include: [number, title, state, body, user, created_at, updated_at, labels, assignees, milestone]
  array_limits:
    default: 20
    labels: 5
    assignees: 3
  string_limits:
    body: 300
  strip_markup: true
  depth_limit: 2

# Detail tools: generous limits — agent called this specifically for full context.
issue_read:
  string_limits:
    body: 10000
  strip_markup: true
  depth_limit: 3

pull_request_read:
  string_limits:
    body: 5000
  strip_markup: true
  depth_limit: 3

get_issue:
  string_limits:
    body: 10000
  strip_markup: true
  depth_limit: 3

get_pull_request:
  string_limits:
    body: 5000
  strip_markup: true
  depth_limit: 3

# Code review tools
list_pull_request_files:
  include: [filename, status, additions, deletions, changes, patch]
  array_limits:
    default: 100
  string_limits:
    patch: 5000
  depth_limit: 1

get_commit:
  string_limits:
    message: 2000
    patch: 3000
  array_limits:
    files: 50
  depth_limit: 3

list_commits:
  include: [sha, commit, author]
  array_limits:
    default: 30
  string_limits:
    message: 300
  depth_limit: 2

# Search tools: massive noise reduction from URL fields
search_code:
  include: [total_count, incomplete_results, items]
  array_limits:
    items: 20
    text_matches: 3
  string_limits:
    fragment: 500
  depth_limit: 3
  exclude_always: [score, gravatar_id, archive_url, assignees_url, blobs_url, branches_url, collaborators_url, comments_url, commits_url, compare_url, contents_url, contributors_url, deployments_url, downloads_url, events_url, forks_url, git_commits_url, git_refs_url, git_tags_url, hooks_url, issue_comment_url, issue_events_url, issues_url, keys_url, labels_url, languages_url, merges_url, milestones_url, notifications_url, pulls_url, releases_url, stargazers_url, statuses_url, subscribers_url, subscription_url, tags_url, teams_url, trees_url]

search_repositories:
  include: [total_count, incomplete_results, items]
  array_limits:
    items: 15
    topics: 10
  string_limits:
    description: 300
  depth_limit: 2
  exclude_always: [score, gravatar_id, archive_url, assignees_url, blobs_url, branches_url, collaborators_url, comments_url, commits_url, compare_url, contents_url, contributors_url, deployments_url, downloads_url, events_url, forks_url, git_commits_url, git_refs_url, git_tags_url, hooks_url, issue_comment_url, issue_events_url, issues_url, keys_url, labels_url, languages_url, merges_url, milestones_url, notifications_url, pulls_url, releases_url, stargazers_url, statuses_url, subscribers_url, subscription_url, tags_url, teams_url, trees_url]

search_issues:
  include: [total_count, items]
  array_limits:
    items: 20
    labels: 5
  string_limits:
    body: 200
  strip_markup: true
  depth_limit: 2
  exclude_always: [score]

# File/repo browsing
get_file_contents:
  depth_limit: 2

list_repository_contents:
  include: [name, path, type, size, sha]
  array_limits:
    default: 200
  depth_limit: 1

# Global default for all other tools
"*":
  depth_limit: 3
  auto_strip_threshold: 500
