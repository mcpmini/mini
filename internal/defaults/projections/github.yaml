# Philosophy: docs/default-config-philosophy.md
# For list ops that already return minimal fields (GitHub Copilot MCP pre-filters
# responses), exclude_always on image URLs is sufficient; no include list needed.
# For list ops over raw REST/GraphQL responses, include lists are used to control
# which top-level fields pass through.
# String limits follow the doc: 1500 for list bodies, 500 for commit messages,
# 8000 for detail views. The bar for exclusion is high — keep the field if unsure.

list_pull_requests:
  exclude_always: [avatar_url]
  string_limits:
    body: 1500

list_issues:
  include: [issues, totalCount, pageInfo]
  string_limits:
    body: 1500

# Detail tools: generous limits. Agent may need to read and reference the full body.
issue_read:
  exclude_always: [avatar_url]
  string_limits:
    body: 8000

pull_request_read:
  exclude_always: [avatar_url]
  string_limits:
    body: 8000
    diff: 4000
  # get_files returns per-file patches that can each run tens of KB; omit_limits
  # replaces oversized patches with a placeholder pointing at the raw response file.
  omit_limits:
    patch: 1800
  hint: "for full diffs, use method get_files and read() the response file, or fetch get_diff for the whole PR"

get_issue:
  exclude_always: [avatar_url]
  string_limits:
    body: 8000

get_pull_request:
  exclude_always: [avatar_url]
  string_limits:
    body: 8000

list_pull_request_files:
  include: [filename, status, additions, deletions, changes, patch]
  array_limits:
    default: 100
  string_limits:
    patch: 5000

get_commit:
  exclude_always: [avatar_url]
  string_limits:
    message: 2000
    patch: 3000
  array_limits:
    files: 50

list_commits:
  exclude_always: [avatar_url]
  array_limits:
    default: 30
  string_limits:
    message: 500

search_code:
  include: [total_count, incomplete_results, items]
  array_limits:
    items: 20
    text_matches: 3
  string_limits:
    fragment: 500
  exclude_always: [score, gravatar_id, archive_url, assignees_url, blobs_url, branches_url, collaborators_url, comments_url, commits_url, compare_url, contents_url, contributors_url, deployments_url, downloads_url, events_url, forks_url, git_commits_url, git_refs_url, git_tags_url, hooks_url, issue_comment_url, issue_events_url, issues_url, keys_url, labels_url, languages_url, merges_url, milestones_url, notifications_url, pulls_url, releases_url, stargazers_url, statuses_url, subscribers_url, subscription_url, tags_url, teams_url, trees_url]

search_repositories:
  include: [total_count, incomplete_results, items]
  array_limits:
    items: 15
    topics: 10
  string_limits:
    description: 400
  exclude_always: [score, gravatar_id, archive_url, assignees_url, blobs_url, branches_url, collaborators_url, comments_url, commits_url, compare_url, contents_url, contributors_url, deployments_url, downloads_url, events_url, forks_url, git_commits_url, git_refs_url, git_tags_url, hooks_url, issue_comment_url, issue_events_url, issues_url, keys_url, labels_url, languages_url, merges_url, milestones_url, notifications_url, pulls_url, releases_url, stargazers_url, statuses_url, subscribers_url, subscription_url, tags_url, teams_url, trees_url]

search_issues:
  include: [total_count, items]
  array_limits:
    items: 20
    labels: 5
  string_limits:
    body: 500
  exclude_always: [score]

get_file_contents:

list_repository_contents:
  include: [name, path, type, size, sha]
  array_limits:
    default: 200
