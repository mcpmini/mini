# Philosophy: docs/default-config-philosophy.md
# No depth_limit — use exclude_always for specific noise, not structural cuts.
# Slimify already caps nesting at 2 levels; summaryTokens threshold handles large responses.
# html_url kept — real URL, agents reference it. Only URL templates excluded.

list_pull_requests:
  include: [number, title, state, draft, merged, body, user, created_at, updated_at, labels, assignees, requested_reviewers, head, base, milestone, html_url]
  array_limits:
    default: 20
    labels: 5
    assignees: 3
    requested_reviewers: 3
  string_limits:
    body: 1500

list_issues:
  include: [issues, totalCount, pageInfo]
  array_limits:
    issues: 20
  string_limits:
    body: 1500

# Detail tools: no include filter, generous limits. Agent may read and update.
issue_read:
  exclude_always: [avatar_url]
  string_limits:
    body: 5000

pull_request_read:
  exclude_always: [avatar_url]
  string_limits:
    body: 5000

get_issue:
  exclude_always: [avatar_url]
  string_limits:
    body: 5000

get_pull_request:
  exclude_always: [avatar_url]
  string_limits:
    body: 5000

list_pull_request_files:
  include: [filename, status, additions, deletions, changes, patch]
  array_limits:
    default: 100
  string_limits:
    patch: 5000

get_commit:
  exclude_always: [avatar_url]
  string_limits:
    message: 2000
    patch: 3000
  array_limits:
    files: 50

list_commits:
  include: [sha, html_url, commit, author]
  array_limits:
    default: 30
  string_limits:
    message: 500

search_code:
  include: [total_count, incomplete_results, items]
  array_limits:
    items: 20
    text_matches: 3
  string_limits:
    fragment: 500
  exclude_always: [score, gravatar_id, archive_url, assignees_url, blobs_url, branches_url, collaborators_url, comments_url, commits_url, compare_url, contents_url, contributors_url, deployments_url, downloads_url, events_url, forks_url, git_commits_url, git_refs_url, git_tags_url, hooks_url, issue_comment_url, issue_events_url, issues_url, keys_url, labels_url, languages_url, merges_url, milestones_url, notifications_url, pulls_url, releases_url, stargazers_url, statuses_url, subscribers_url, subscription_url, tags_url, teams_url, trees_url]

search_repositories:
  include: [total_count, incomplete_results, items]
  array_limits:
    items: 15
    topics: 10
  string_limits:
    description: 400
  exclude_always: [score, gravatar_id, archive_url, assignees_url, blobs_url, branches_url, collaborators_url, comments_url, commits_url, compare_url, contents_url, contributors_url, deployments_url, downloads_url, events_url, forks_url, git_commits_url, git_refs_url, git_tags_url, hooks_url, issue_comment_url, issue_events_url, issues_url, keys_url, labels_url, languages_url, merges_url, milestones_url, notifications_url, pulls_url, releases_url, stargazers_url, statuses_url, subscribers_url, subscription_url, tags_url, teams_url, trees_url]

search_issues:
  include: [total_count, items]
  array_limits:
    items: 20
    labels: 5
  string_limits:
    body: 500
  exclude_always: [score]

get_file_contents:

list_repository_contents:
  include: [name, path, type, size, sha]
  array_limits:
    default: 200

