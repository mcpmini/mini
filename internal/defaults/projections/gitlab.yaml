list_merge_requests:
  include: [iid, title, state, draft, author, created_at, updated_at, labels, assignees, source_branch, target_branch, milestone, merge_status, web_url]
  array_limits:
    default: 20
    labels: 5
    assignees: 3
  string_limits:
    description: 1000
  depth_limit: 2

list_issues:
  include: [iid, title, state, author, created_at, updated_at, labels, assignees, milestone, web_url]
  array_limits:
    default: 20
    labels: 5
    assignees: 3
  depth_limit: 2

get_issue:
  include: [iid, title, state, author, created_at, updated_at, labels, assignees, milestone, description, web_url]
  string_limits:
    description: 5000
  depth_limit: 3

get_merge_request:
  include: [iid, title, state, draft, author, created_at, updated_at, labels, assignees, source_branch, target_branch, description, changes_count, diff_refs, web_url]
  string_limits:
    description: 2000
  depth_limit: 3

list_commits:
  include: [id, short_id, title, author_name, created_at, message, web_url]
  array_limits:
    default: 20
  string_limits:
    message: 500
  depth_limit: 1

list_pipelines:
  include: [id, status, ref, sha, created_at, updated_at, duration, web_url]
  array_limits:
    default: 20
  depth_limit: 2

"*":
  depth_limit: 3
  auto_strip_threshold: 500
