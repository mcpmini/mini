list_issues:
  include: [nodes, pageInfo]
  array_limits:
    nodes: 25
    labels: 5
  depth_limit: 3
  exclude_always: [sortOrder, subIssueSortOrder, archivedAt, autoArchivedAt, autoClosedAt, canceledAt, completedAt, snoozedUntilAt, trashed, previousIdentifiers]
  string_limits:
    description: 1500

search_issues:
  include: [nodes, pageInfo, totalCount]
  array_limits:
    nodes: 20
    labels: 5
  depth_limit: 3
  exclude_always: [sortOrder, subIssueSortOrder, archivedAt, autoArchivedAt, autoClosedAt, canceledAt, completedAt, snoozedUntilAt, trashed, previousIdentifiers]
  string_limits:
    description: 1000

get_issue:
  depth_limit: 4
  exclude_always: [sortOrder, subIssueSortOrder, archivedAt, autoArchivedAt, autoClosedAt, canceledAt, completedAt, snoozedUntilAt, trashed, previousIdentifiers]
  string_limits:
    description: 5000

create_issue:
  depth_limit: 4
  exclude_always: [sortOrder, subIssueSortOrder, archivedAt, autoArchivedAt, autoClosedAt, canceledAt, completedAt, snoozedUntilAt, trashed, previousIdentifiers]
  string_limits:
    description: 5000

update_issue:
  depth_limit: 4
  exclude_always: [sortOrder, subIssueSortOrder, archivedAt, autoArchivedAt, autoClosedAt, canceledAt, completedAt, snoozedUntilAt, trashed, previousIdentifiers]
  string_limits:
    description: 5000

list_projects:
  include: [nodes, pageInfo]
  array_limits:
    nodes: 20
  depth_limit: 2
  exclude_always: [sortOrder, archivedAt, autoArchivedAt, trashed]

list_teams:
  include: [nodes]
  array_limits:
    nodes: 20
  depth_limit: 2

list_cycles:
  include: [nodes]
  array_limits:
    nodes: 10
  depth_limit: 2
  exclude_always: [archivedAt, autoArchivedAt]

list_comments:
  include: [nodes, pageInfo]
  array_limits:
    nodes: 30
  depth_limit: 2
  string_limits:
    body: 2000

"*":
  depth_limit: 3
  auto_strip_threshold: 500
