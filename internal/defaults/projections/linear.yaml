list_issues:
  include: [nodes, pageInfo]
  array_limits:
    nodes: 25
    labels: 5
  exclude_always: [sortOrder, subIssueSortOrder, archivedAt, autoArchivedAt, autoClosedAt, canceledAt, completedAt, snoozedUntilAt, trashed, previousIdentifiers]
  string_limits:
    description: 2000

search_issues:
  include: [nodes, pageInfo, totalCount]
  array_limits:
    nodes: 20
    labels: 5
  exclude_always: [sortOrder, subIssueSortOrder, archivedAt, autoArchivedAt, autoClosedAt, canceledAt, completedAt, snoozedUntilAt, trashed, previousIdentifiers]
  string_limits:
    description: 1000

# Detail tools: agent may read and update — no include filter, generous limits
get_issue:
  exclude_always: [sortOrder, subIssueSortOrder, archivedAt, autoArchivedAt, autoClosedAt, canceledAt, completedAt, snoozedUntilAt, trashed, previousIdentifiers]
  string_limits:
    description: 5000

create_issue:
  exclude_always: [sortOrder, subIssueSortOrder, archivedAt, autoArchivedAt, autoClosedAt, canceledAt, completedAt, snoozedUntilAt, trashed, previousIdentifiers]
  string_limits:
    description: 5000

update_issue:
  exclude_always: [sortOrder, subIssueSortOrder, archivedAt, autoArchivedAt, autoClosedAt, canceledAt, completedAt, snoozedUntilAt, trashed, previousIdentifiers]
  string_limits:
    description: 5000

list_projects:
  include: [nodes, pageInfo]
  array_limits:
    nodes: 20
  exclude_always: [sortOrder, archivedAt, autoArchivedAt, trashed]

list_teams:
  include: [nodes]
  array_limits:
    nodes: 20

list_cycles:
  include: [nodes]
  array_limits:
    nodes: 10
  exclude_always: [archivedAt, autoArchivedAt]

list_comments:
  include: [nodes, pageInfo]
  array_limits:
    nodes: 30
  string_limits:
    body: 2000

