list_issues:
  array_limits:
    nodes: 25
    labels: 5
  exclude: [sortOrder, subIssueSortOrder, archivedAt, autoArchivedAt, autoClosedAt, canceledAt, completedAt, snoozedUntilAt, trashed, previousIdentifiers]
  string_limits:
    description: 2000

search_issues:
  array_limits:
    nodes: 20
    labels: 5
  exclude: [sortOrder, subIssueSortOrder, archivedAt, autoArchivedAt, autoClosedAt, canceledAt, completedAt, snoozedUntilAt, trashed, previousIdentifiers]
  string_limits:
    description: 1000

# Detail tools: agent may read and update — no include filter, generous limits
get_issue:
  exclude: [sortOrder, subIssueSortOrder, archivedAt, autoArchivedAt, autoClosedAt, canceledAt, completedAt, snoozedUntilAt, trashed, previousIdentifiers]
  string_limits:
    description: 5000

create_issue:
  exclude: [sortOrder, subIssueSortOrder, archivedAt, autoArchivedAt, autoClosedAt, canceledAt, completedAt, snoozedUntilAt, trashed, previousIdentifiers]
  string_limits:
    description: 5000

update_issue:
  exclude: [sortOrder, subIssueSortOrder, archivedAt, autoArchivedAt, autoClosedAt, canceledAt, completedAt, snoozedUntilAt, trashed, previousIdentifiers]
  string_limits:
    description: 5000

list_projects:
  array_limits:
    nodes: 20
  exclude: [sortOrder, archivedAt, autoArchivedAt, trashed]

list_teams:
  array_limits:
    nodes: 20

list_cycles:
  array_limits:
    nodes: 10
  exclude: [archivedAt, autoArchivedAt]

list_comments:
  array_limits:
    nodes: 30
  string_limits:
    body: 2000

