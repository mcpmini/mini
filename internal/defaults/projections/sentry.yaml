list_issues:
  include_only: [id, title, culprit, level, status, platform, project, metadata, firstSeen, lastSeen, count, userCount, isUnhandled, assignedTo, permalink, numComments]
  array_limits:
    default: 25
  string_limits:
    message: 1500

get_issue_details:
  # pluginActions/pluginContexts/pluginIssues are Sentry UI extension points,
  # not issue data — agents never act on these.
  exclude_always: [pluginActions, pluginContexts, pluginIssues, seenBy, userReport, annotations]
  string_limits:
    message: 5000

list_events:
  include_only: [id, eventID, message, platform, dateCreated, level, tags, user]
  array_limits:
    default: 20
    tags: 15
  string_limits:
    message: 1000

list_projects:
  include_only: [id, name, slug, platform, status, firstEvent, hasAccess, isMember, isBookmarked, isInternal]
  array_limits:
    default: 30

list_organizations:
  include_only: [id, name, slug, status, dateCreated, role, features]
  array_limits:
    default: 10

