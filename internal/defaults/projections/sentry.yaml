list_issues:
  array_limits:
    default: 25
  string_limits:
    message: 1500

get_issue_details:
  # pluginActions/pluginContexts/pluginIssues are Sentry UI extension points,
  # not issue data — agents never act on these.
  exclude: [pluginActions, pluginContexts, pluginIssues, seenBy, userReport, annotations]
  string_limits:
    message: 5000

list_events:
  array_limits:
    default: 20
    tags: 15
  string_limits:
    message: 1000

list_projects:
  array_limits:
    default: 30

list_organizations:
  array_limits:
    default: 10

