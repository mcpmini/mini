search_issues:
  include: [issues, total, maxResults, startAt]
  array_limits:
    issues: 25
  depth_limit: 3
  exclude_always: [renderedFields, changelog, names, schema, editmeta, operations, versionedRepresentations]
  string_limits:
    description: 500
    summary: 200

get_issue:
  depth_limit: 4
  exclude_always: [renderedFields, changelog, names, schema, editmeta, operations, versionedRepresentations, transitions, watchers]
  string_limits:
    description: 3000

list_projects:
  include: [values, total, maxResults, startAt, isLast]
  array_limits:
    values: 30
  depth_limit: 2
  exclude_always: [avatarUrls, projectKeys, issueTypes, simplified, style, expand]

get_project:
  depth_limit: 3
  exclude_always: [avatarUrls, insight, expand, permissions, issueTypeHierarchy]

search_users:
  array_limits:
    default: 20
  depth_limit: 2
  exclude_always: [avatarUrls, expand, applicationRoles, groups]

list_boards:
  include: [values, total, maxResults, startAt, isLast]
  array_limits:
    values: 30
  depth_limit: 2

get_sprint:
  include: [id, name, state, startDate, endDate, goal]
  depth_limit: 1

"*":
  depth_limit: 3
  auto_strip_threshold: 500
  exclude_always: [avatarUrls, iconUrls, expand]
