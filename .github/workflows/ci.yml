name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.claude/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.claude/**'

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.check.outputs.go }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: check
        run: |
          if [ -n "$GITHUB_BASE_REF" ]; then
            git fetch origin "$GITHUB_BASE_REF" --depth=1
            DIFF=$(git diff --name-only "origin/$GITHUB_BASE_REF"...HEAD)
          else
            DIFF=$(git diff --name-only HEAD~1)
          fi
          if echo "$DIFF" | grep -qE '\.(go|mod|sum)$|^\.github/workflows/'; then
            echo "go=true" >> "$GITHUB_OUTPUT"
          else
            echo "go=false" >> "$GITHUB_OUTPUT"
          fi

  lint:
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4

  unit:
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test -race -tags test -timeout 120s ./...

  integration:
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Integration tests
        run: go test -tags integration,test -timeout 180s ./test/integration/...

  ci:
    runs-on: ubuntu-latest
    needs: [lint, unit, integration]
    if: always()
    steps:
      - name: All checks passed
        run: |
          for result in "${{ needs.lint.result }}" "${{ needs.unit.result }}" "${{ needs.integration.result }}"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              exit 1
            fi
          done
