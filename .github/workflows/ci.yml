name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.claude/**'
  pull_request:
    paths-ignore:
      - '**.md'
      - '.claude/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4

  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test -race -tags test -timeout 120s ./...

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Integration tests
        run: go test -tags integration,test -timeout 180s ./test/integration/...

  ci:
    runs-on: ubuntu-latest
    needs: [lint, unit, integration]
    if: always()
    steps:
      - name: All checks passed
        run: |
          if [[ "${{ needs.lint.result }}" != "success" || "${{ needs.unit.result }}" != "success" || "${{ needs.integration.result }}" != "success" ]]; then
            exit 1
          fi
